<!DOCTYPE html>
<html dir="rtl"><head><meta charset="utf-8"><title>نظام أركت - مراجعة الطلبات</title>
<style>body{font-family:Arial; padding:20px;} textarea{width:100%; height:100px;}</style>
</head><body>
    <h2>مراجعة الطلب رقم: <span id="oid"></span></h2>
    <p id="content">جاري جلب بيانات الطلب...</p>
    <textarea id="notes" placeholder="اكتب ملاحظاتك هنا..."></textarea><br><br>
    <button onclick="saveNotes()">إرسال الملاحظات</button>
<script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderID = urlParams.get('OrderID');
        document.getElementById('oid').innerText = orderID;
        
        // رابط الـ Web App الثابت الخاص بك
        const scriptURL = "https://script.google.com/macros/s/AKfycbyBIBqfCpMShbzyMGJ4cVdN8C1nD5esu1CLXa56xRjs5Aydqz_ggtXot_SXKmVHCaw/exec";

        // جلب البيانات وعرضها عند فتح الصفحة
        fetch(scriptURL + "?OrderID=" + orderID)
            .then(r => r.json())
            .then(data => {
                document.getElementById('content').innerHTML = "<b>تفاصيل الطلب:</b> " + data.ItemsData;
            });

        // دالة إرسال الملاحظات إلى الـ Google Sheets
        function saveNotes() {
            const notes = document.getElementById('notes').value;
            if (!notes) { alert("من فضلك اكتب الملاحظات أولاً!"); return; }
            
            // إظهار رسالة جاري الإرسال
            const btn = document.querySelector('button');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            fetch(scriptURL, {
                method: "POST",
                mode: "no-cors", // ضروري جداً لتجاوز قيود الـ CORS في جوجل
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ OrderID: orderID, Notes: notes })
            })
            .then(() => {
                alert("تم حفظ الملاحظات في قاعدة البيانات بنجاح!");
                btn.innerText = "تم الإرسال";
            })
            .catch(error => {
                alert("حدث خطأ أثناء الحفظ، حاول مرة أخرى.");
                btn.innerText = "إرسال الملاحظات";
                btn.disabled = false;
            });
        }
    </script>
</body></html>
