<!DOCTYPE html>
<html dir="rtl">
<head><meta charset="utf-8"><title>نظام أركت - مراجعة الطلبات</title></head>
<body>
    <h2>مراجعة الطلب رقم: <span id="oid"></span></h2>
    <div id="content">جاري التحميل...</div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('oid').innerText = urlParams.get('OrderID');
        
        // هنا نقوم بفك تشفير البيانات القادمة من الرابط
        const items = urlParams.get('Items');
        document.getElementById('content').innerHTML = "<b>تفاصيل الطلب:</b> " + items;
    </script>
</body>
</html>
